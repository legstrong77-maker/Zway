<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>紫微斗數命盤</title>
    <!-- Use Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div class="container">
      <h1>紫微斗數命盤排盤</h1>
      
      <!-- Input Form -->
      <div class="form-section">
        <form id="zway-form">
          <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" required placeholder="請輸入姓名">
          </div>
          
          <div class="form-group">
            <label>公曆生日</label>
            <div class="date-inputs" style="display: flex; gap: 10px;">
              <select id="birth-year" name="birth-year" required></select>
              <select id="birth-month" name="birth-month" required></select>
              <select id="birth-day" name="birth-day" required></select>
            </div>
          </div>
          
          <div class="form-group">
            <label for="birthtime">出生時辰</label>
            <select id="birthtime" name="birthtime" required>
              <option value="0">子時 (23:00 - 00:59)</option>
              <option value="1">丑時 (01:00 - 02:59)</option>
              <option value="2">寅時 (03:00 - 04:59)</option>
              <option value="3">卯時 (05:00 - 06:59)</option>
              <option value="4">辰時 (07:00 - 08:59)</option>
              <option value="5">巳時 (09:00 - 10:59)</option>
              <option value="6">午時 (11:00 - 12:59)</option>
              <option value="7">未時 (13:00 - 14:59)</option>
              <option value="8">申時 (15:00 - 16:59)</option>
              <option value="9">酉時 (17:00 - 18:59)</option>
              <option value="10">戌時 (19:00 - 20:59)</option>
              <option value="11">亥時 (21:00 - 22:59)</option>
            </select>
          </div>


          
          <button type="submit">開始排盤</button>
        </form>
        <div id="status-message"></div>
      </div>

      <!-- Chart Display Area -->
      <div class="chart-container" id="chart-container">
        
        <!-- Flow Controller -->
        <div id="flow-controller" style="margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
          <label for="flow-date" style="margin:0; font-weight:bold; color: #334155;">流運檢視日期：</label>
          <input type="date" id="flow-date" style="width: auto; padding: 8px 12px; font-size: 1rem;">
          <button type="button" id="btn-update-flow" style="width: auto; padding: 8px 16px;">🔄 更新流運</button>
        </div>

        <div class="chart-grid-wrapper" style="position: relative;">
          
          <div class="chart-grid" id="chart-grid">
            <!-- 12 Palaces will be generated by JS -->
          
          <!-- Center Information -->
          <div class="center-box">
            <h2 id="display-name">求真易學社</h2>
            <div style="text-align: center; margin-bottom: 20px; font-size: 1.1rem; color: #334155;">
               姓名：<span id="info-name"></span>
            </div>
            
            <div style="font-weight: bold; color: #2563eb; text-align: center; margin-bottom: 10px; font-size: 1.05rem;">
               <span id="info-gender-icon">♂</span> 基本信息
            </div>
            
            <div class="center-info" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; text-align: left; font-size: 0.95rem; color: #475569; padding: 0 10px; border-top: 1px dashed #cbd5e1; padding-top: 15px;">
              <div>五行局：<span id="info-element"></span></div>
              <div>年齡(虛歲)：<span id="info-age"></span> 歲</div>
              
              <div>四柱：<span id="info-bazi"></span></div>
              <div>陽曆：<span id="info-solar"></span></div>
              
              <div>農曆：<span id="info-lunar"></span></div>
              <div>時辰：<span id="info-time"></span></div>
              
              <div>生肖：<span id="info-zodiac"></span></div>
              <div>星座：<span id="info-sign"></span></div>
              
              <div>命主：<span id="info-soul"></span></div>
              <div>身主：<span id="info-body"></span></div>
              
              <div>命宮：<span id="info-soul-palace"></span></div>
              <div>身宮：<span id="info-body-palace"></span></div>
            </div>
          </div>
        </div>

        <!-- Analysis Report Section -->
        <div class="analysis-section" id="analysis-section" style="display: none;">
          <h2>命理分析報告</h2>
          
          <!-- Action Buttons -->
          <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 30px;">
             <button id="btn-download" type="button" style="width: auto; background-color: #475569; box-shadow: none;">📸 儲存命盤圖片</button>
             <button id="btn-line-share" type="button" style="width: auto; background-color: #06c755; box-shadow: none;">💬 分享至 LINE</button>
          </div>

          <div id="analysis-content" class="analysis-content">
            <!-- Content will be injected by main.js -->
          </div>
        </div>
      </div>
    </div>
    
    <!-- Tooltip Container -->
    <div id="palace-tooltip" class="palace-tooltip"></div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
